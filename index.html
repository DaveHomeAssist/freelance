<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0B">
  <title>Rapid Sites — Professional Websites in 48 Hours</title>
      <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/favicon/apple-touch-icon.png" />
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; }
    #loading { position: fixed; inset: 0; z-index: 9999; background: #0A0A0B;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.4s ease; }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 14px; }
  </style>
</head>
<body>
  <div id="loading"><div id="loading-spinner"></div><div id="loading-text">Loading...</div></div>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/app.js"></script>
  <script>
    const el = document.getElementById('loading');
    const check = () => { if (document.getElementById('root').children.length > 0) { el.classList.add('hide'); setTimeout(() => el.remove(), 500); } else { requestAnimationFrame(check); } };
    requestAnimationFrame(check);
    setTimeout(() => { el.classList.add('hide'); }, 3000);
  </script>
</body>
</html>
