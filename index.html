<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0A0A0B; color: #f4f7fb; }
    .skip-link {
      position: absolute;
      left: -9999px;
      top: auto;
      padding: 8px 16px;
      z-index: 10000;
      text-decoration: none;
      border-radius: 4px;
      font-size: 14px;
      background: #0A0A0B;
      color: #7ee7d8;
    }
    .skip-link:focus { left: 10px; top: 10px; outline: 2px solid currentColor; }
    .fallback-header,
    .fallback-main {
      max-width: 880px;
      margin: 0 auto;
      padding: 16px;
    }
    .fallback-header {
      display: grid;
      gap: 10px;
      margin-top: 3rem;
    }
    .fallback-header h1 {
      font-size: clamp(1.9rem, 4vw, 2.6rem);
      line-height: 1.05;
    }
    .fallback-header nav a {
      color: #7ee7d8;
      text-decoration: none;
      font-weight: 600;
    }
    .fallback-header nav a:hover,
    .fallback-header nav a:focus-visible { text-decoration: underline; }
    .fallback-copy { color: rgba(255,255,255,0.74); line-height: 1.6; }
    #loading { position: fixed; inset: 0; z-index: 9999; background: #0A0A0B;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity 0.4s ease; }
    #loading.hide { opacity: 0; pointer-events: none; }
    #loading-spinner { width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 14px; }
    a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid #7ee7d8;
      outline-offset: 3px;
    }
    .back-link { color: rgba(255,255,255,0.4); }
    .back-link:hover { color: currentColor; }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
  </style>
</head>
<body>
  <a href="#root" class="skip-link">Skip to content</a>
  <a href="https://davehomeassist.github.io/"
     class="back-link"
     style="display:inline-flex;align-items:center;gap:.35rem;position:fixed;
            top:.65rem;left:.85rem;z-index:100;font-size:.7rem;
            letter-spacing:.04em;text-decoration:none;transition:color .15s;">&larr; DaveHomeAssist</a>
  <header class="fallback-header">
    <h1>Rapid Sites — Professional Websites in 48 Hours</h1>
    <nav aria-label="Primary navigation">
      <a href="https://davehomeassist.github.io/">Back to DaveHomeAssist</a>
    </nav>

  </header>
  <main class="fallback-main">
    <div id="loading"><div id="loading-spinner"></div><div id="loading-text">Loading...</div></div>
    <div id="root">
      <noscript>
        <div style="padding:2rem 0;line-height:1.7;">
          <h2 style="font-size:1.4rem;margin-bottom:.5rem;color:#7ee7d8;">Professional Websites in 48 Hours</h2>
          <p class="fallback-copy" style="margin-bottom:1rem;">Rapid Sites builds fast, beautiful, mobile-ready websites for restaurants, contractors, law firms, and small businesses. Fixed pricing, no surprises — serving Philadelphia &amp; South Jersey.</p>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">Packages</h3>
          <ul style="list-style:disc;padding-left:1.5rem;color:rgba(255,255,255,0.74);margin-bottom:1rem;">
            <li>Starter — $750 flat, 48-hour delivery</li>
            <li>Professional — $1,500 flat, 3-5 day delivery (most popular)</li>
            <li>Premium — $2,500 flat, 5-7 day delivery</li>
          </ul>
          <h3 style="font-size:1.1rem;margin-bottom:.4rem;">Get Started</h3>
          <p class="fallback-copy">
            Email: <a href="mailto:hello@rapidsites.dev" style="color:#7ee7d8;">hello@rapidsites.dev</a><br>
            Phone: <a href="tel:+12676653324" style="color:#7ee7d8;">(267) 665-3324</a><br>
            Free 15-minute consultation — no pressure, no commitment.
          </p>
          <p style="color:rgba(255,255,255,0.4);font-size:.85rem;margin-top:1rem;">Enable JavaScript for the full interactive experience including portfolio, pricing details, and contact form.</p>
        </div>
      </noscript>
    </div>
  </main>
  <script defer crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js" integrity="sha384-MhvFknC0AhqKZXwSCyPeIirpE1IhTafmLXTvTCai5pxjAqFcqEAAqKH/2lXrFVPn"></script>
  <script defer crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" integrity="sha384-VQePqH/QE94Buf4g/4MI5NrqDYjdqT7JW6KzhieQUlw6w7U7VD59fPqCAunpXEu6"></script>
  <script defer src="app.js"></script>
  <script>
    const el = document.getElementById('loading');
    const check = () => { if (document.getElementById('root').children.length > 0) { el.classList.add('hide'); setTimeout(() => el.remove(), 500); } else { requestAnimationFrame(check); } };
    requestAnimationFrame(check);
    setTimeout(() => { el.classList.add('hide'); }, 3000);
  </script>
</body>
</html>
